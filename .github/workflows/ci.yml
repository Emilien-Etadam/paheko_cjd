name: CI

on:
  push:
    branches: [master, 'cursor/**']
  pull_request:
    branches: [master, 'cursor/**']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: KD2 dependencies
        run: make -C src deps

      - name: PHP syntax (php -l)
        run: make -C src test-syntax

      - name: Unit tests
        run: make -C src tests

      - name: PHPStan
        run: make -C src phpstan

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: ESLint (scripts admin)
        run: npm run lint:js

      - name: Stylelint (CSS admin)
        run: npm run lint:css

      - name: Build Vite
        run: npm run build
